<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quiz — Just An Intern</title>
<script>
(() => {
  const token = localStorage.getItem('cvforge_token');
  if (!token) window.location.href = 'auth.html?redirect=quiz.html' + location.search;
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#090B0F;--s1:#131720;--s2:#181D28;--s3:#1E2433;--s4:#242A3A;
  --b0:rgba(255,255,255,.04);--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.11);
  --t0:#F0F2F8;--t1:#B8BECC;--t2:#7A8299;--t3:#4A5166;
  --blue:#4F7AFF;--blue2:#6B93FF;--blue3:#3A62E8;--bd:rgba(79,122,255,.15);--bg_blue:rgba(79,122,255,.08);
  --green:#22C55E;--gd:rgba(34,197,94,.12);
  --amber:#F59E0B;--ad:rgba(245,158,11,.12);
  --red:#EF4444;--rd:rgba(239,68,68,.12);
  --r8:8px;--r10:10px;--r12:12px;--r16:16px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --th:54px;
  --ease:cubic-bezier(.16,1,.3,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --shadow-lg:0 16px 40px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
html,body{font-family:var(--font);background:var(--bg);color:var(--t0);font-size:14px;line-height:1.5;min-height:100%}

#topbar{position:fixed;top:0;left:0;right:0;height:var(--th);z-index:400;background:rgba(9,11,15,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.brand-logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#3A62E8,#6B93FF);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff}
.brand-name{font-size:14px;font-weight:800}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r8);font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;border:1px solid transparent;transition:all .15s}
.btn-ghost{background:transparent;color:var(--t1);border-color:var(--b2)}
.btn-ghost:hover{background:var(--s2);color:var(--t0)}
.btn-primary{background:linear-gradient(135deg,#3A62E8,#5B87FF);color:#fff;border-color:rgba(79,122,255,.4);box-shadow:0 2px 8px rgba(79,122,255,.3)}
.btn-primary:hover{background:linear-gradient(135deg,#4B73F9,#6B97FF)}
.btn-lg{padding:11px 24px;font-size:14px;border-radius:var(--r10)}

/* TIMER */
.timer-bar{height:3px;background:var(--b1);border-radius:2px;overflow:hidden;margin-bottom:0}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue2));border-radius:2px;transition:width .5s linear}

/* MAIN */
#main{padding:calc(var(--th)+32px) 20px 60px;max-width:680px;margin:0 auto}

/* QUIZ META */
.quiz-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.quiz-meta-left h1{font-size:18px;font-weight:800;color:var(--t0);margin-bottom:4px}
.quiz-meta-left p{font-size:12px;color:var(--t2)}
.timer-display{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--t0);background:var(--s1);border:1.5px solid var(--b1);border-radius:var(--r10);padding:8px 16px;min-width:90px;text-align:center}
.timer-display.warn{color:var(--amber);border-color:rgba(245,158,11,.3);background:var(--ad);animation:tick .5s ease-in-out infinite}
.timer-display.danger{color:var(--red);border-color:rgba(239,68,68,.3);background:var(--rd)}
@keyframes tick{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* PROGRESS DOTS */
.q-dots{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:22px}
.q-dot{width:20px;height:6px;border-radius:3px;background:var(--b1);transition:all .2s}
.q-dot.answered{background:var(--blue2)}
.q-dot.current{background:var(--blue);box-shadow:0 0 8px rgba(79,122,255,.5)}
.q-dot.correct{background:var(--green)}
.q-dot.wrong{background:var(--red)}

/* QUESTION CARD */
.q-card{background:var(--s1);border:1.5px solid var(--b1);border-radius:var(--r16);padding:24px;margin-bottom:18px;animation:q-in .35s var(--ease) both}
@keyframes q-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--blue2);margin-bottom:10px}
.q-text{font-size:15px;font-weight:700;color:var(--t0);line-height:1.5;margin-bottom:18px}
.q-options{display:flex;flex-direction:column;gap:8px}
.q-opt{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-radius:var(--r10);
  border:1.5px solid var(--b1);background:var(--s2);
  cursor:pointer;transition:all .15s var(--ease);font-size:13px;font-weight:500;color:var(--t1);
  user-select:none;
}
.q-opt:hover:not(.disabled){border-color:rgba(79,122,255,.4);background:var(--bg_blue);color:var(--t0)}
.q-opt.selected{border-color:var(--blue);background:var(--bg_blue);color:var(--blue2)}
.q-opt.correct{border-color:var(--green);background:var(--gd);color:var(--green)}
.q-opt.wrong{border-color:var(--red);background:var(--rd);color:var(--red)}
.q-opt.disabled{cursor:default}
.opt-letter{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;transition:all .15s;background:var(--s3)}
.q-opt.selected .opt-letter{background:var(--blue);border-color:var(--blue);color:#fff}
.q-opt.correct .opt-letter{background:var(--green);border-color:var(--green);color:#fff}
.q-opt.wrong .opt-letter{background:var(--red);border-color:var(--red);color:#fff}
.q-explanation{margin-top:14px;padding:11px 13px;border-radius:var(--r8);background:var(--s3);border:1px solid var(--b1);font-size:12px;color:var(--t1);line-height:1.6;display:none}
.q-explanation.show{display:block;animation:q-in .3s var(--ease)}
.q-explanation strong{color:var(--t0)}

/* Q NAV */
.q-nav{display:flex;justify-content:space-between;align-items:center;gap:10px}

/* RESULTS SCREEN */
#results-screen{display:none;max-width:680px;margin:0 auto;padding:calc(var(--th)+32px) 20px 60px;animation:q-in .5s var(--ease) both}
.result-card{background:var(--s1);border:1.5px solid var(--b1);border-radius:var(--r16);padding:28px;text-align:center;margin-bottom:20px}
.result-score-ring{position:relative;width:100px;height:100px;margin:0 auto 16px}
.result-score-ring svg{position:absolute;inset:0;width:100%;height:100%}
.result-score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.result-num{font-size:26px;font-weight:800;line-height:1}
.result-den{font-size:10px;color:var(--t3);margin-top:2px}
.result-verdict{font-size:20px;font-weight:800;margin-bottom:6px}
.result-sub{font-size:13px;color:var(--t2);margin-bottom:20px}
.result-stats{display:flex;justify-content:center;gap:24px;margin-bottom:20px;flex-wrap:wrap}
.rstat{text-align:center}
.rstat-num{font-size:18px;font-weight:800;line-height:1}
.rstat-lbl{font-size:10px;color:var(--t3);margin-top:3px}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* CERT BANNER */
.cert-banner{background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(79,122,255,.08));border:1.5px solid rgba(34,197,94,.3);border-radius:var(--r16);padding:20px;text-align:center;margin-bottom:16px;animation:q-in .5s .2s var(--ease) both;opacity:0}
.cert-ico{font-size:36px;margin-bottom:8px}
.cert-title{font-size:16px;font-weight:800;color:var(--green);margin-bottom:4px}
.cert-sub{font-size:12px;color:var(--t2);margin-bottom:14px}

.spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(79,122,255,.2);border-top-color:var(--blue2);animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

#loading-screen{display:flex;align-items:center;justify-content:center;height:calc(100vh - var(--th));flex-direction:column;gap:14px;color:var(--t2)}

@media(max-width:480px){
  #main,#results-screen{padding:calc(var(--th)+16px) 14px 60px}
  .q-card{padding:16px}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand" onclick="history.back()">
    <div class="brand-logo">CV</div>
    <span class="brand-name">Just An Intern</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="topbar-quiz-title" style="font-size:11px;color:var(--t2)"></span>
    <button class="btn btn-ghost" onclick="if(confirm('Exit quiz? Your progress will be lost.'))history.back()">Exit Quiz</button>
  </div>
</div>
<div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="spinner" style="width:28px;height:28px;border-width:3px"></div>
  <div>Loading quiz…</div>
</div>

<!-- QUIZ SCREEN -->
<div id="main" style="display:none">
  <div class="quiz-meta">
    <div class="quiz-meta-left">
      <h1 id="quiz-title">Quiz</h1>
      <p id="quiz-sub">Answer all questions · 80% to pass</p>
    </div>
    <div class="timer-display" id="timer-display">30:00</div>
  </div>

  <div class="q-dots" id="q-dots"></div>

  <div id="q-card-wrap"></div>

  <div class="q-nav">
    <button class="btn btn-ghost" id="prev-btn" onclick="navigate(-1)">← Previous</button>
    <span id="q-counter" style="font-size:11px;color:var(--t3)"></span>
    <button class="btn btn-primary" id="next-btn" onclick="navigate(1)">Next →</button>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen">
  <div id="cert-banner-wrap"></div>

  <div class="result-card" id="result-card">
    <div class="result-score-ring" id="score-ring">
      <svg viewBox="0 0 100 100" style="transform:rotate(-90deg)">
        <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="8"/>
        <circle id="score-arc" cx="50" cy="50" r="40" fill="none" stroke="var(--green)" stroke-width="8"
          stroke-dasharray="251.3" stroke-dashoffset="251.3" stroke-linecap="round"
          style="transition:stroke-dashoffset 1.2s var(--ease)"/>
      </svg>
      <div class="result-score-inner">
        <div class="result-num" id="score-num">0</div>
        <div class="result-den">%</div>
      </div>
    </div>
    <div class="result-verdict" id="result-verdict">—</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-stats">
      <div class="rstat"><div class="rstat-num" id="rs-correct" style="color:var(--green)">0</div><div class="rstat-lbl">Correct</div></div>
      <div class="rstat"><div class="rstat-num" id="rs-wrong" style="color:var(--red)">0</div><div class="rstat-lbl">Wrong</div></div>
      <div class="rstat"><div class="rstat-num" id="rs-time">—</div><div class="rstat-lbl">Time</div></div>
    </div>
    <div class="result-actions" id="result-actions"></div>
  </div>
</div>

<script>
const API_BASE = localStorage.getItem('cvforge_api_base') || 'http://localhost:3000';
const API = `${API_BASE}/api`;
const getH = () => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${localStorage.getItem('cvforge_token')||''}` });

const params = new URLSearchParams(location.search);
const COURSE_ID = params.get('courseId');
if (!COURSE_ID) location.href = 'courses.html';

let quiz, questions;
let answers   = {};   // {questionId: selectedIndex}
let curIdx    = 0;
let startTime = Date.now();
let timerInterval;
let timeLimit;
let submitted = false;

function fmt(secs) {
  const m = Math.floor(secs/60).toString().padStart(2,'0');
  const s = (secs%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

async function boot() {
  try {
    const res  = await fetch(`${API}/courses/${COURSE_ID}/quiz`, { headers: getH() });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    quiz      = data.quiz;
    questions = data.questions;
    timeLimit = quiz.time_limit;

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main').style.display = 'block';

    document.title = `${quiz.title} — Just An Intern`;
    document.getElementById('topbar-quiz-title').textContent = quiz.title;
    document.getElementById('quiz-title').textContent = quiz.title;
    document.getElementById('quiz-sub').textContent = `${questions.length} questions · Pass with ${quiz.passing_score}%`;

    renderDots();
    renderQuestion();
    startTimer();

  } catch(e) {
    document.getElementById('loading-screen').innerHTML = `<div style="text-align:center;color:var(--red)">${e.message}<br><br><a href="courses.html" class="btn btn-ghost">← Back to Courses</a></div>`;
  }
}

function renderDots() {
  document.getElementById('q-dots').innerHTML = questions.map((q,i) =>
    `<div class="q-dot${i===curIdx?' current':''}" id="dot-${i}"></div>`
  ).join('');
}

function updateDot(i, state) {
  const dot = document.getElementById(`dot-${i}`);
  if (dot) dot.className = `q-dot ${state}`;
}

function renderQuestion() {
  const q = questions[curIdx];
  const opts = JSON.parse(typeof q.options === 'string' ? q.options : JSON.stringify(q.options));
  const selected = answers[q.id];

  document.getElementById('q-counter').textContent = `${curIdx+1} / ${questions.length}`;
  document.getElementById('prev-btn').disabled = curIdx === 0;

  const isLast = curIdx === questions.length - 1;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = isLast ? 'Submit Quiz' : 'Next →';
  nextBtn.className   = isLast ? 'btn btn-primary' : 'btn btn-primary';

  const letters = ['A','B','C','D'];
  document.getElementById('q-card-wrap').innerHTML = `
    <div class="q-card">
      <div class="q-num">Question ${curIdx+1} of ${questions.length} · <span style="color:var(--t3)">${q.difficulty||'medium'}</span></div>
      <div class="q-text">${q.question}</div>
      <div class="q-options">
        ${opts.map((opt,i) => `
          <div class="q-opt${selected===i?' selected':''}" onclick="selectOpt(${q.id},${i},this.closest('.q-options'))">
            <div class="opt-letter">${letters[i]}</div>
            <span>${opt}</span>
          </div>`).join('')}
      </div>
    </div>`;

  // Update current dot
  document.querySelectorAll('.q-dot').forEach((d,i) => {
    d.className = 'q-dot' + (answers[questions[i].id]!==undefined?' answered':'') + (i===curIdx?' current':'');
  });
}

function selectOpt(qId, optIdx, container) {
  answers[qId] = optIdx;
  container.querySelectorAll('.q-opt').forEach((el,i) => {
    el.classList.toggle('selected', i===optIdx);
    el.querySelector('.opt-letter').style.background = i===optIdx ? 'var(--blue)' : '';
  });
  updateDot(curIdx, 'answered');
}

function navigate(dir) {
  const newIdx = curIdx + dir;
  if (newIdx < 0) return;
  if (newIdx >= questions.length) {
    submitQuiz();
    return;
  }
  curIdx = newIdx;
  renderQuestion();
}

function startTimer() {
  const display = document.getElementById('timer-display');
  const fill    = document.getElementById('timer-fill');
  let remaining = timeLimit;

  timerInterval = setInterval(() => {
    remaining--;
    const pct = (remaining / timeLimit) * 100;
    display.textContent = fmt(remaining);
    fill.style.width = pct + '%';
    fill.style.background = remaining < 60
      ? 'linear-gradient(90deg,var(--red),var(--amber))'
      : remaining < 300
      ? 'linear-gradient(90deg,var(--amber),var(--blue2))'
      : 'linear-gradient(90deg,var(--green),var(--blue2))';

    display.className = 'timer-display' + (remaining < 60?' danger':remaining < 300?' warn':'');

    if (remaining <= 0) { clearInterval(timerInterval); submitQuiz(); }
  }, 1000);
}

async function submitQuiz() {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInterval);

  const timeTaken = Math.round((Date.now() - startTime) / 1000);
  const unanswered = questions.filter(q => answers[q.id] === undefined).length;

  if (unanswered > 0 && !confirm(`You have ${unanswered} unanswered question${unanswered>1?'s':''}. Submit anyway?`)) {
    submitted = false;
    startTimer();
    return;
  }

  document.getElementById('main').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('result-card').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--t2)"><div class="spinner" style="width:24px;height:24px;border-width:3px"></div> Grading…</div>`;

  try {
    const res  = await fetch(`${API}/courses/${COURSE_ID}/quiz/submit`, {
      method: 'POST',
      headers: getH(),
      body: JSON.stringify({ answers, timeTaken })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    showResults(data, timeTaken);

  } catch(e) {
    document.getElementById('result-card').innerHTML = `<div style="color:var(--red);padding:20px;text-align:center">${e.message}</div>`;
  }
}

function showResults(data, timeTaken) {
  const { score, passed, correct, total, feedback, certificate } = data;

  // Cert banner
  if (certificate) {
    document.getElementById('cert-banner-wrap').innerHTML = `
      <div class="cert-banner">
        <div class="cert-ico">🏆</div>
        <div class="cert-title">Certificate Earned!</div>
        <div class="cert-sub">Congratulations! You passed with ${score}%. Your certificate is ready.</div>
        <a href="certificate.html?id=${certificate.cert_uuid}" class="btn btn-primary btn-lg">View Certificate →</a>
      </div>`;
  }

  // Score ring
  document.getElementById('result-card').innerHTML = `
    <div class="result-score-ring" style="margin:0 auto 16px">
      <svg viewBox="0 0 100 100" style="transform:rotate(-90deg)">
        <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="8"/>
        <circle id="score-arc" cx="50" cy="50" r="40" fill="none"
          stroke="${passed?'var(--green)':score>=60?'var(--amber)':'var(--red)'}"
          stroke-width="8" stroke-dasharray="251.3" stroke-dashoffset="251.3" stroke-linecap="round"
          style="transition:stroke-dashoffset 1.2s var(--ease)"/>
      </svg>
      <div class="result-score-inner">
        <div class="result-num" style="color:${passed?'var(--green)':score>=60?'var(--amber)':'var(--red)'}" id="score-num">0</div>
        <div class="result-den">%</div>
      </div>
    </div>
    <div class="result-verdict" style="color:${passed?'var(--green)':score>=60?'var(--amber)':'var(--red)'}">${passed?'🎉 You Passed!':score>=60?'So Close!':'Try Again'}</div>
    <div class="result-sub" style="color:var(--t2);margin-bottom:18px">${passed?'You scored '+score+'% and earned a certificate!':'You need 80% to pass. You scored '+score+'%.'}</div>
    <div class="result-stats" style="display:flex;justify-content:center;gap:24px;margin-bottom:20px;flex-wrap:wrap">
      <div class="rstat"><div class="rstat-num" style="color:var(--green);font-size:18px;font-weight:800">${correct}</div><div class="rstat-lbl">Correct</div></div>
      <div class="rstat"><div class="rstat-num" style="color:var(--red);font-size:18px;font-weight:800">${total-correct}</div><div class="rstat-lbl">Wrong</div></div>
      <div class="rstat"><div class="rstat-num" style="font-size:18px;font-weight:800;color:var(--t0)">${fmt(timeTaken)}</div><div class="rstat-lbl">Time</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="location.href='course.html?id=${COURSE_ID}'">← Back to Course</button>
      ${!passed?`<button class="btn btn-primary" onclick="location.reload()">Retry Quiz</button>`:''}
      ${certificate?`<a href="certificate.html?id=${certificate.cert_uuid}" class="btn btn-primary">View Certificate →</a>`:''}
    </div>`;

  // Animate score
  setTimeout(() => {
    const arc = document.getElementById('score-arc');
    if (arc) arc.style.strokeDashoffset = 251.3 - (251.3 * score / 100);
    let n = 0;
    const target = score;
    const timer = setInterval(() => {
      n = Math.min(n + 2, target);
      const el = document.getElementById('score-num');
      if (el) el.textContent = n;
      if (n >= target) clearInterval(timer);
    }, 20);
  }, 100);

  // Show per-question feedback
  if (feedback) {
    const feedbackHtml = questions.map((q, i) => {
      const opts = JSON.parse(typeof q.options==='string'?q.options:JSON.stringify(q.options));
      const fb   = feedback[q.id];
      const sel  = answers[q.id];
      return `
        <div style="background:var(--s1);border:1.5px solid ${fb?.correct?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'};border-radius:var(--r12);padding:16px;margin-bottom:10px">
          <div style="font-size:10px;font-weight:700;color:${fb?.correct?'var(--green)':'var(--red)'};margin-bottom:8px">${fb?.correct?'✓ CORRECT':'✗ INCORRECT'} · Q${i+1}</div>
          <div style="font-size:13px;font-weight:600;color:var(--t0);margin-bottom:10px">${q.question}</div>
          ${opts.map((opt,oi)=>`
            <div style="padding:8px 12px;border-radius:var(--r8);margin-bottom:5px;font-size:12px;border:1px solid;
              ${oi===fb?.correct_index?'background:var(--gd);border-color:rgba(34,197,94,.3);color:var(--green)':
                oi===sel&&!fb?.correct?'background:var(--rd);border-color:rgba(239,68,68,.3);color:var(--red)':
                'background:var(--s2);border-color:var(--b1);color:var(--t2)'}">
              ${['A','B','C','D'][oi]}. ${opt}
              ${oi===fb?.correct_index?' ← Correct':''}
            </div>`).join('')}
          ${fb?.explanation?`<div style="margin-top:8px;padding:8px 10px;border-radius:var(--r8);background:var(--s3);border:1px solid var(--b1);font-size:11px;color:var(--t1)">💡 ${fb.explanation}</div>`:''}
        </div>`;
    }).join('');

    document.getElementById('results-screen').insertAdjacentHTML('beforeend', `
      <div style="margin-top:8px">
        <div style="font-size:13px;font-weight:800;color:var(--t0);margin-bottom:14px">Answer Review</div>
        ${feedbackHtml}
      </div>`);
  }
}

boot();
</script>
</body>
</html>
