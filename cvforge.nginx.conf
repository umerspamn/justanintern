# ═══════════════════════════════════════════════════════════════
#  CVForge — nginx configuration
#  File: cvforge.nginx.conf
#
#  INSTALL:
#    sudo cp cvforge.nginx.conf /etc/nginx/sites-available/cvforge
#    sudo ln -s /etc/nginx/sites-available/cvforge \
#               /etc/nginx/sites-enabled/cvforge
#    sudo nginx -t
#    sudo systemctl reload nginx
#
#  EDIT BEFORE USE:
#    1. Replace YOUR_DOMAIN_OR_IP with your EC2 public IP or domain
#    2. Adjust root path if you deployed to a different directory
#    3. Uncomment the HTTPS block after running certbot
#
#  SSL (recommended):
#    sudo apt install certbot python3-certbot-nginx   # Ubuntu
#    sudo certbot --nginx -d yourdomain.com
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;

    # ── REPLACE WITH YOUR DOMAIN OR EC2 PUBLIC IP ───────────────
    server_name YOUR_DOMAIN_OR_IP;

    # ── ROOT: WHERE YOU UPLOADED THE FILES ──────────────────────
    root /var/www/cvforge;

    # Serve index.html as the default file
    index index.html;

    # ── SECURITY HEADERS ────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Content Security Policy
    # Allows: self, Google Fonts (if you switch back to CDN fonts),
    # Cloudflare CDN (html2pdf.js fallback), data URIs for PDF export
    add_header Content-Security-Policy
      "default-src 'self'; \
       script-src  'self' 'unsafe-eval'; \
       style-src   'self' 'unsafe-inline' https://fonts.googleapis.com; \
       font-src    'self' https://fonts.gstatic.com; \
       img-src     'self' data: blob:; \
       connect-src 'self'; \
       frame-src   'none';"
      always;

    # ── STATIC ASSET CACHING ────────────────────────────────────
    # Long cache for versioned assets (fonts, JS)
    location ~* \.(woff2?|js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Medium cache for images
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── MAIN APP ROUTE ───────────────────────────────────────────
    # Single-page app: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── DENY ACCESS TO HIDDEN FILES ─────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── GZIP COMPRESSION ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/html
        text/javascript
        application/javascript
        application/json
        font/woff2;

    # ── LOGGING ─────────────────────────────────────────────────
    access_log /var/log/nginx/cvforge.access.log;
    error_log  /var/log/nginx/cvforge.error.log warn;
}

# ── HTTPS BLOCK ──────────────────────────────────────────────────
# Uncomment and fill in after running: sudo certbot --nginx -d yourdomain.com
# Certbot will auto-populate the ssl_certificate paths.
