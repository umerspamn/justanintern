services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cvforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./cvforge-backend/sql/auth_schema.sql:/docker-entrypoint-initdb.d/01-auth-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cvforge"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./cvforge-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cvforge
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-in-production
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: llama-3.3-70b-versatile
      CORS_ORIGINS: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pg_data: