<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Listings — Just An Intern</title>
<meta name="description" content="Live job listings matched to your career prediction."/>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090B0F;
  --s0:#0D1018;--s1:#131720;--s2:#181D28;--s3:#1E2433;--s4:#242A3A;
  --b0:rgba(255,255,255,.04);--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.11);--b3:rgba(255,255,255,.17);
  --t0:#F0F2F8;--t1:#B8BECC;--t2:#7A8299;--t3:#4A5166;
  --blue:#4F7AFF;--blue2:#6B93FF;--blue3:#3A62E8;--bd:rgba(79,122,255,.15);--bg_blue:rgba(79,122,255,.08);
  --green:#22C55E;--gd:rgba(34,197,94,.12);
  --amber:#F59E0B;--ad:rgba(245,158,11,.12);
  --red:#EF4444;--rd:rgba(239,68,68,.12);
  --r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --th:54px;
  --ease:cubic-bezier(.16,1,.3,1);
  --shadow-lg:0 16px 40px rgba(0,0,0,.5),0 4px 12px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:var(--font);background:var(--bg);color:var(--t0);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:rgba(79,122,255,.3)}

body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.025) 1px,transparent 1px);background-size:28px 28px}
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(79,122,255,.14) 0%,transparent 65%);top:-200px;left:-150px}
.bg-orb-2{width:480px;height:480px;background:radial-gradient(circle,rgba(167,139,250,.08) 0%,transparent 65%);bottom:-150px;right:-120px}

.app{position:relative;z-index:1;min-height:100vh}

/* navbar */
.nav{position:sticky;top:0;z-index:50;height:var(--th);padding:0 18px;display:flex;align-items:center;justify-content:space-between;background:rgba(9,11,15,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b1)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-ico{width:30px;height:30px;border-radius:var(--r8);background:linear-gradient(135deg,var(--blue3),var(--blue));display:grid;place-items:center;box-shadow:0 2px 10px rgba(79,122,255,.35)}
.nav-ico svg{width:16px;height:16px;color:#fff}
.nav-name{font-size:14px;font-weight:800;color:var(--t0);letter-spacing:-.2px;line-height:1.1}
.nav-name small{display:block;font-size:10.5px;font-weight:600;color:var(--t2);letter-spacing:.02em}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-link{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:var(--r8);font-size:12px;font-weight:600;color:var(--t2);text-decoration:none;border:1px solid transparent;transition:all .15s var(--ease);font-family:var(--font)}
.nav-link:hover{color:var(--t0);background:var(--s2);border-color:var(--b1)}
.nav-link.active{color:var(--blue2);background:var(--bg_blue);border-color:var(--bd)}
.nav-link svg{width:13px;height:13px}

/* layout */
.container{max-width:900px;margin:0 auto;padding:36px 20px 80px}

/* page header */
.page-head{margin-bottom:32px}
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);text-decoration:none;margin-bottom:14px;transition:color .15s}
.back-link:hover{color:var(--t0)}
.back-link svg{width:13px;height:13px}
.page-title{font-size:clamp(22px,4vw,32px);font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.page-sub{color:var(--t2);font-size:14px}
.grad{background:linear-gradient(135deg,#6B93FF 0%,#A78BFA 60%,#60C9FF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;background:var(--s2);border:1px solid var(--b1);color:var(--t2);cursor:pointer;transition:all .15s;font-family:var(--font)}
.filter-btn:hover{border-color:var(--b3);color:var(--t0)}
.filter-btn.active{background:var(--bg_blue);border-color:var(--bd);color:var(--blue2)}
.filter-btn svg{width:12px;height:12px}

/* stats row */
.stats-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r12);padding:14px 18px;flex:1;min-width:120px}
.stat-val{font-size:22px;font-weight:800;color:var(--blue2);line-height:1}
.stat-lbl{font-size:11px;font-weight:600;color:var(--t2);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}

/* job cards */
.jobs-list{display:flex;flex-direction:column;gap:12px}
.job-card{background:var(--s1);border:1.5px solid var(--b1);border-radius:var(--r20);padding:20px;display:flex;gap:16px;align-items:flex-start;transition:border-color .2s,transform .2s,box-shadow .2s;cursor:default}
.job-card:hover{border-color:rgba(79,122,255,.4);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.job-logo{width:46px;height:46px;border-radius:var(--r10);background:var(--s3);border:1px solid var(--b1);display:grid;place-items:center;flex-shrink:0;overflow:hidden}
.job-logo img{width:100%;height:100%;object-fit:contain;border-radius:var(--r10)}
.job-logo svg{width:22px;height:22px;color:var(--t3)}
.job-body{flex:1;min-width:0}
.job-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.job-title{font-size:15px;font-weight:700;color:var(--t0);margin-bottom:3px}
.job-company{font-size:13px;color:var(--t1)}
.job-salary{font-size:15px;font-weight:800;color:var(--blue2);white-space:nowrap}
.job-posted{font-size:11px;color:var(--t3);margin-top:2px;text-align:right}
.job-pills{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.pill-default{background:var(--s3);border:1px solid var(--b1);color:var(--t1)}
.pill-blue{background:var(--bg_blue);border:1px solid var(--bd);color:var(--blue2)}
.pill-green{background:var(--gd);border:1px solid rgba(34,197,94,.2);color:#4ade80}
.pill-amber{background:var(--ad);border:1px solid rgba(245,158,11,.2);color:#fbbf24}
.pill svg{width:10px;height:10px}
.job-desc{font-size:12.5px;color:var(--t2);line-height:1.65;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.job-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.job-source{font-size:11px;color:var(--t3)}
.btn-apply{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r8);background:linear-gradient(135deg,var(--blue3),#5B87FF);color:#fff;font-size:12px;font-weight:700;text-decoration:none;border:1px solid rgba(79,122,255,.4);transition:all .15s var(--ease);font-family:var(--font)}
.btn-apply:hover{background:linear-gradient(135deg,#4B73F9,#6B97FF);transform:translateY(-1px);box-shadow:0 4px 20px rgba(79,122,255,.4)}
.btn-apply svg{width:13px;height:13px}

/* salary insight box */
.salary-box{background:linear-gradient(135deg,var(--s2),var(--s1));border:1px solid var(--bd);border-radius:var(--r16);padding:20px;margin-bottom:24px}
.salary-box-title{font-size:13px;font-weight:700;color:var(--blue2);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.salary-box-title svg{width:15px;height:15px}
.salary-range{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.salary-range-item{text-align:center}
.salary-range-val{font-size:20px;font-weight:800;color:var(--t0)}
.salary-range-lbl{font-size:11px;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.salary-divider{font-size:20px;color:var(--t3)}

/* loading */
.loading{display:flex;flex-direction:column;align-items:center;gap:16px;padding:80px 0;color:var(--t2);text-align:center}
.loading svg{color:var(--blue)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}

/* empty / error */
.alert{display:flex;gap:10px;padding:16px;border-radius:var(--r12);font-size:13px;line-height:1.55}
.alert svg{width:17px;height:17px;flex-shrink:0;margin-top:1px}
.alert-danger{background:var(--rd);border:1px solid rgba(239,68,68,.25);color:#FCA5A5}
.alert-info{background:var(--bg_blue);border:1px solid var(--bd);color:var(--blue2)}

@media(max-width:600px){
  .job-top{flex-direction:column;gap:8px}
  .job-salary{text-align:left}
  .stats-row{gap:8px}
}
</style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="app">
  <!-- Navbar -->
  <nav class="nav">
    <a href="index.html" class="nav-brand">
      <div class="nav-ico"><i data-lucide="briefcase"></i></div>
      <div class="nav-name">Job Listings<small>Just An Intern</small></div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link"><i data-lucide="home"></i> Home</a>
      <a href="index.html#cvmaker" class="nav-link"><i data-lucide="file-text"></i> CV Maker</a>
      <a href="careerpredictor.html" class="nav-link"><i data-lucide="compass"></i> Predictor</a>
      <a href="recruiter.html" class="nav-link active"><i data-lucide="briefcase"></i> Jobs</a>
    </div>
  </nav>

  <div class="container" id="root"></div>
</div>

<script>
const API    = 'http://localhost:3000/api';
const params = new URLSearchParams(window.location.search);
const CAREER  = params.get('career')   || 'Software Engineer';
const LOCATION= params.get('location') || 'Pakistan';
const SALARY  = params.get('salary')   || '';

const SALARY_ESTIMATES = {
  'Software Engineer':          { min: 80000, max: 200000, currency: 'PKR/month' },
  'Data Scientist':             { min: 100000, max: 250000, currency: 'PKR/month' },
  'Cyber Security Analyst':     { min: 90000, max: 220000, currency: 'PKR/month' },
  'Graphic/UI UX Designer':     { min: 60000, max: 150000, currency: 'PKR/month' },
  'MBBS Doctor':                { min: 80000, max: 300000, currency: 'PKR/month' },
  'Chartered Accountant (CA)':  { min: 120000, max: 400000, currency: 'PKR/month' },
  'ACCA Professional':          { min: 90000, max: 250000, currency: 'PKR/month' },
  'Financial Analyst / CFA':    { min: 100000, max: 280000, currency: 'PKR/month' },
  'Marketing Manager':          { min: 70000, max: 180000, currency: 'PKR/month' },
  'CSS Officer (Civil Service)': { min: 60000, max: 180000, currency: 'PKR/month' },
  'Lawyer / Advocate':          { min: 50000, max: 300000, currency: 'PKR/month' },
  'Civil Engineer':             { min: 60000, max: 160000, currency: 'PKR/month' },
  'Mechanical Engineer':        { min: 60000, max: 150000, currency: 'PKR/month' },
  'Digital Freelancer':         { min: 50000, max: 500000, currency: 'PKR/month' },
  'default':                    { min: 50000, max: 150000, currency: 'PKR/month' }
};

let STATE = {
  jobs: [],
  loading: true,
  error: null,
  filter: 'all'
};

async function fetchJobs() {
  try {
    const res  = await fetch(`${API}/jobs/search?career=${encodeURIComponent(CAREER)}&location=${encodeURIComponent(LOCATION)}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    STATE.jobs    = data.jobs || [];
    STATE.loading = false;
  } catch (e) {
    STATE.error   = e.message;
    STATE.loading = false;
  }
  render();
}

function timeAgo(dateStr) {
  if (!dateStr) return 'Recently';
  const days = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  if (days < 7)  return `${days} days ago`;
  if (days < 30) return `${Math.floor(days/7)}w ago`;
  return `${Math.floor(days/30)}mo ago`;
}

function formatSalary(job) {
  if (!job.salary_min && !job.salary_max) return null;
  const fmt    = n => n >= 1000 ? `$${(n/1000).toFixed(0)}k` : `$${n}`;
  const period = job.salary_period ? `/${job.salary_period.toLowerCase().replace('yearly','yr').replace('monthly','mo')}` : '/yr';
  if (job.salary_min && job.salary_max) return `${fmt(job.salary_min)} – ${fmt(job.salary_max)}${period}`;
  if (job.salary_max) return `Up to ${fmt(job.salary_max)}${period}`;
  return `From ${fmt(job.salary_min)}${period}`;
}

function getPKSalary() {
  return SALARY_ESTIMATES[CAREER] || SALARY_ESTIMATES['default'];
}

function filteredJobs() {
  if (STATE.filter === 'remote') return STATE.jobs.filter(j => j.remote);
  if (STATE.filter === 'fulltime') return STATE.jobs.filter(j => j.type?.toLowerCase().includes('full'));
  return STATE.jobs;
}

function setFilter(f) {
  STATE.filter = f;
  render();
}

function render() {
  const pkSalary = getPKSalary();
  const jobs     = filteredJobs();
  const remote   = STATE.jobs.filter(j => j.remote).length;
  const fulltime = STATE.jobs.filter(j => j.type?.toLowerCase().includes('full')).length;

  document.getElementById('root').innerHTML = `

    <!-- Page Header -->
    <div class="page-head">
      <a href="careerpredictor.html" class="back-link">
        <i data-lucide="arrow-left"></i> Back to results
      </a>
      <h1 class="page-title"><span class="grad">${CAREER}</span> Jobs</h1>
      <p class="page-sub">
        ${STATE.loading ? 'Searching live jobs…' :
          STATE.error   ? 'Could not load jobs' :
          `${STATE.jobs.length} live listings found · ${LOCATION}`}
      </p>
    </div>

    <!-- Pakistan Salary Insight -->
    <div class="salary-box">
      <div class="salary-box-title">
        <i data-lucide="trending-up"></i>
        Pakistan Salary Estimate — ${CAREER}
      </div>
      <div class="salary-range">
        <div class="salary-range-item">
          <div class="salary-range-val">PKR ${(pkSalary.min/1000).toFixed(0)}k</div>
          <div class="salary-range-lbl">Entry level</div>
        </div>
        <div class="salary-divider">→</div>
        <div class="salary-range-item">
          <div class="salary-range-val">PKR ${(pkSalary.max/1000).toFixed(0)}k</div>
          <div class="salary-range-lbl">Senior level</div>
        </div>
        <div class="salary-divider">·</div>
        <div class="salary-range-item">
          <div class="salary-range-val" style="font-size:14px;color:var(--t1)">${pkSalary.currency}</div>
          <div class="salary-range-lbl">Local market</div>
        </div>
      </div>
    </div>

    ${!STATE.loading && !STATE.error ? `
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val">${STATE.jobs.length}</div>
        <div class="stat-lbl">Total jobs</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${remote}</div>
        <div class="stat-lbl">Remote</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${fulltime}</div>
        <div class="stat-lbl">Full-time</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${STATE.jobs.filter(j => {const d=Math.floor((Date.now()-new Date(j.posted))/86400000);return d<=7}).length}</div>
        <div class="stat-lbl">This week</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn ${STATE.filter==='all'?'active':''}" onclick="setFilter('all')">
        <i data-lucide="list"></i> All (${STATE.jobs.length})
      </button>
      <button class="filter-btn ${STATE.filter==='remote'?'active':''}" onclick="setFilter('remote')">
        <i data-lucide="wifi"></i> Remote (${remote})
      </button>
      <button class="filter-btn ${STATE.filter==='fulltime'?'active':''}" onclick="setFilter('fulltime')">
        <i data-lucide="clock"></i> Full-time (${fulltime})
      </button>
    </div>
    ` : ''}

    <!-- Content -->
    ${STATE.loading ? `
      <div class="loading">
        <i data-lucide="loader-2" class="spin" style="width:32px;height:32px"></i>
        <div>
          <p style="font-size:15px;font-weight:700;color:var(--t0);margin-bottom:4px">Fetching live jobs…</p>
          <p style="font-size:13px">Searching across LinkedIn, Indeed & Glassdoor</p>
        </div>
      </div>
    ` : STATE.error ? `
      <div class="alert alert-danger">
        <i data-lucide="alert-circle"></i>
        <div><strong>Failed to load jobs:</strong> ${STATE.error}<br>
        <span style="font-size:12px;margin-top:4px;display:block">Make sure your backend is running on port 3000 and RAPIDAPI_KEY is set.</span></div>
      </div>
    ` : jobs.length === 0 ? `
      <div class="alert alert-info">
        <i data-lucide="info"></i>
        <div>No jobs found for <strong>${CAREER}</strong> with this filter. Try switching to "All".</div>
      </div>
    ` : `
      <div class="jobs-list">
        ${jobs.map(job => `
          <div class="job-card">
            <div class="job-logo">
              ${job.logo
                ? `<img src="${job.logo}" alt="${job.company}" onerror="this.parentElement.innerHTML='<i data-lucide=building-2></i>'">`
                : `<i data-lucide="building-2"></i>`}
            </div>
            <div class="job-body">
              <div class="job-top">
                <div>
                  <div class="job-title">${job.title}</div>
                  <div class="job-company">${job.company} · ${job.location || LOCATION}</div>
                </div>
                <div>
                  <div class="job-salary">${formatSalary(job) || `PKR ${(pkSalary.min/1000).toFixed(0)}k–${(pkSalary.max/1000).toFixed(0)}k/mo`}</div>
                  <div class="job-posted">${timeAgo(job.posted)}</div>
                </div>
              </div>

              <div class="job-pills">
                ${job.type ? `<span class="pill pill-default"><i data-lucide="clock"></i> ${job.type}</span>` : ''}
                ${job.remote ? `<span class="pill pill-green"><i data-lucide="wifi"></i> Remote</span>` : ''}
                <span class="pill pill-blue"><i data-lucide="briefcase"></i> ${CAREER}</span>
                ${job.publisher ? `<span class="pill pill-default">${job.publisher}</span>` : ''}
              </div>

              <p class="job-desc">${job.description || 'No description available.'}</p>

              <div class="job-footer">
                <span class="job-source">via ${job.publisher || 'Job Board'}</span>
                <a href="${job.apply_link}" target="_blank" rel="noopener noreferrer" class="btn-apply">
                  <i data-lucide="external-link"></i> Apply Now
                </a>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `}
  `;

  lucide.createIcons();
  window.setFilter = setFilter;
}

render();
fetchJobs();
</script>
</body>
</html>
